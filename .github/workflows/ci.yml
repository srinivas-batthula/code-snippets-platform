name: CI Pipeline

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: ./install.sh

      - name: Build Web
        run: cd web && npm run build

      - name: Build Extension
        run: cd extension && npm run pretest
